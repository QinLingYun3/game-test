<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>2048 Game</title>
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }
    body {
      background: #faf8ef;
      font-family: 'Arial', 'Helvetica Neue', sans-serif;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      margin: 0;
    }
    .container {
      width: 100%;
      max-width: 420px;
      padding: 16px;
    }
    .header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 12px;
    }
    .title {
      font-size: 48px;
      font-weight: 800;
      color: #776e65;
      line-height: 1;
    }
    .score-board {
      display: flex;
      gap: 8px;
    }
    .score-box {
      background: #bbada0;
      border-radius: 8px;
      padding: 6px 12px;
      text-align: center;
      min-width: 70px;
    }
    .score-label {
      font-size: 11px;
      color: #eee4da;
      text-transform: uppercase;
      font-weight: bold;
      letter-spacing: 0.5px;
    }
    .score-value {
      font-size: 22px;
      font-weight: 800;
      color: #fff;
    }
    .btn-group {
      display: flex;
      gap: 8px;
      margin-bottom: 12px;
    }
    .btn {
      background: #8f7a66;
      border: none;
      color: #f9f6f2;
      font-size: 16px;
      font-weight: 700;
      padding: 10px 20px;
      border-radius: 8px;
      cursor: pointer;
      transition: background 0.2s;
      flex: 1;
    }
    .btn:hover {
      background: #9e8b7a;
    }
    .btn.undo {
      background: #bbada0;
      flex: 0.6;
    }
    .btn.undo:hover {
      background: #cdbdb0;
    }
    .grid-container {
      position: relative;
      background: #bbada0;
      border-radius: 12px;
      padding: 8px;
      aspect-ratio: 1 / 1;
      width: 100%;
    }
    .grid-background {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 8px;
      width: 100%;
      height: 100%;
    }
    .grid-cell {
      background: rgba(238, 228, 218, 0.35);
      border-radius: 8px;
    }
    .tile-container {
      position: absolute;
      top: 8px;
      left: 8px;
      right: 8px;
      bottom: 8px;
    }
    .tile {
      position: absolute;
      display: flex;
      align-items: center;
      justify-content: center;
      border-radius: 8px;
      font-weight: 800;
      transition: top 0.12s ease, left 0.12s ease;
      z-index: 10;
    }
    .tile.new-tile {
      animation: tileAppear 0.2s ease;
    }
    .tile.merged {
      animation: tilePop 0.3s ease;
      z-index: 20;
    }
    @keyframes tileAppear {
      0% {
        opacity: 0;
        transform: scale(0);
      }
      50% {
        opacity: 1;
        transform: scale(1.1);
      }
      100% {
        transform: scale(1);
      }
    }
    @keyframes tilePop {
      0% {
        transform: scale(1);
      }
      50% {
        transform: scale(1.2);
      }
      100% {
        transform: scale(1);
      }
    }
    /* 数字配色 */
    .tile-2    { background: #eee4da; color: #776e65; }
    .tile-4    { background: #ede0c8; color: #776e65; }
    .tile-8    { background: #f2b179; color: #f9f6f2; }
    .tile-16   { background: #f59563; color: #f9f6f2; }
    .tile-32   { background: #f67c5f; color: #f9f6f2; }
    .tile-64   { background: #f65e3b; color: #f9f6f2; }
    .tile-128  { background: #edcf72; color: #f9f6f2; font-size: 0.9em; }
    .tile-256  { background: #edcc61; color: #f9f6f2; font-size: 0.9em; }
    .tile-512  { background: #edc850; color: #f9f6f2; font-size: 0.9em; }
    .tile-1024 { background: #edc53f; color: #f9f6f2; font-size: 0.75em; }
    .tile-2048 { background: #edc22e; color: #f9f6f2; font-size: 0.75em; }
    .tile-super { background: #3c3a32; color: #f9f6f2; font-size: 0.6em; }

    /* 游戏结束遮罩 */
    .game-over-overlay {
      position: absolute;
      top: 0; left: 0; right: 0; bottom: 0;
      background: rgba(238,228,218,0.73);
      border-radius: 12px;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      z-index: 100;
      animation: fadeIn 0.5s ease;
    }
    @keyframes fadeIn {
      0% { opacity: 0; }
      100% { opacity: 1; }
    }
    .game-over-text {
      font-size: 48px;
      font-weight: 800;
      color: #776e65;
      margin-bottom: 20px;
    }
    .game-over-score {
      font-size: 22px;
      color: #776e65;
      margin-bottom: 16px;
    }
    .btn-retry {
      background: #8f7a66;
      border: none;
      color: #f9f6f2;
      font-size: 20px;
      font-weight: 700;
      padding: 12px 36px;
      border-radius: 8px;
      cursor: pointer;
      transition: background 0.2s;
    }
    .btn-retry:hover {
      background: #9e8b7a;
    }
    .hide {
      display: none !important;
    }
    .high-score {
      font-size: 13px;
      color: #bbaeb0;
      margin-top: 8px;
      text-align: center;
    }
  </style>
</head>
<body>
<div class="container">
  <div class="header">
    <div class="title">2048</div>
    <div class="score-board">
      <div class="score-box">
        <div class="score-label">Score</div>
        <div class="score-value" id="score">0</div>
      </div>
      <div class="score-box">
        <div class="score-label">Best</div>
        <div class="score-value" id="best-score">0</div>
      </div>
    </div>
  </div>
  <div class="btn-group">
    <button class="btn" id="newGameBtn">🎮 新游戏</button>
    <button class="btn undo" id="undoBtn">↩ 撤销</button>
    <button class="btn" id="aiBtn">🤖 自动</button>
  </div>
  <div class="grid-container" id="gridContainer">
    <div class="grid-background" id="gridBackground">
      <!-- 4x4 grid cells are generated by JS -->
    </div>
    <div class="tile-container" id="tileContainer"></div>
    <!-- Game Over Overlay -->
    <div class="game-over-overlay hide" id="gameOverOverlay">
      <div class="game-over-text">Game Over!</div>
      <div class="game-over-score" id="finalScore">得分: 0</div>
      <button class="btn-retry" id="retryBtn">重新开始</button>
    </div>
  </div>
  <div class="high-score" id="highScoreDisplay">最高分: 0</div>
</div>

<script>
  (function() {
    'use strict';

    // ---------- Game State ----------
    const SIZE = 4;
    let grid = [];           // 2D array of numbers (0 = empty)
    let score = 0;
    let bestScore = parseInt(localStorage.getItem('best2048')) || 0;
    let isGameOver = false;

    // For undo
    let history = [];        // stores { grid, score } snapshots

    // For AI auto-move
    let aiTimer = null;
    let aiRunning = false;

    // Audio context for merge sound
    let audioCtx = null;
    function playMergeSound() {
      if (!audioCtx) {
        try {
          audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        } catch(e) {
          return; // Silently skip if audio not supported
        }
      }
      try {
        const osc = audioCtx.createOscillator();
        const gain = audioCtx.createGain();
        osc.connect(gain);
        gain.connect(audioCtx.destination);
        // A short pleasant 'ding' sound
        osc.frequency.setValueAtTime(880, audioCtx.currentTime);
        osc.frequency.exponentialRampToValueAtTime(660, audioCtx.currentTime + 0.08);
        gain.gain.setValueAtTime(0.12, audioCtx.currentTime);
        gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.1);
        osc.start(audioCtx.currentTime);
        osc.stop(audioCtx.currentTime + 0.12);
      } catch(e) { /* ignore */ }
    }

    // DOM references
    const tileContainer = document.getElementById('tileContainer');
    const gridBackground = document.getElementById('gridBackground');
    const scoreEl = document.getElementById('score');
    const bestScoreEl = document.getElementById('best-score');
    const highScoreDisplay = document.getElementById('highScoreDisplay');
    const gameOverOverlay = document.getElementById('gameOverOverlay');
    const finalScoreEl = document.getElementById('finalScore');
    const newGameBtn = document.getElementById('newGameBtn');
    const retryBtn = document.getElementById('retryBtn');
    const undoBtn = document.getElementById('undoBtn');
    const aiBtn = document.getElementById('aiBtn');

    // ---------- Grid Generation ----------
    function initGrid() {
      grid = Array.from({ length: SIZE }, () => Array(SIZE).fill(0));
    }

    // ---------- Render Background Cells ----------
    function renderBackground() {
      gridBackground.innerHTML = '';
      for (let r = 0; r < SIZE; r++) {
        for (let c = 0; c < SIZE; c++) {
          const cell = document.createElement('div');
          cell.className = 'grid-cell';
          gridBackground.appendChild(cell);
        }
      }
    }

    // ---------- Tile Helpers ----------
    function getTileSize() {
      const container = document.getElementById('gridContainer');
      const containerSize = container.clientWidth - 16; // padding 8px each side
      const gapTotal = (SIZE - 1) * 8; // gap between cells
      const cellSize = (containerSize - gapTotal) / SIZE;
      return cellSize;
    }

    function getTilePosition(row, col) {
      const cellSize = getTileSize();
      const top = row * (cellSize + 8);
      const left = col * (cellSize + 8);
      return { top, left, size: cellSize };
    }

    // ---------- Render Tiles ----------
    function renderTiles(animateNew = [], animateMerge = []) {
      tileContainer.innerHTML = '';
      const cellSize = getTileSize();

      for (let r = 0; r < SIZE; r++) {
        for (let c = 0; c < SIZE; c++) {
          const value = grid[r][c];
          if (value === 0) continue;

          const tile = document.createElement('div');
          const { top, left } = getTilePosition(r, c);
          tile.style.width = cellSize + 'px';
          tile.style.height = cellSize + 'px';
          tile.style.top = top + 'px';
          tile.style.left = left + 'px';
          tile.style.fontSize = Math.max(14, cellSize * 0.38) + 'px';
          tile.textContent = value;
          tile.className = 'tile tile-' + value;
          // super class for >2048
          if (value > 2048) {
            tile.classList.add('tile-super');
          }

          // Add animation classes
          if (animateNew.some(pos => pos[0] === r && pos[1] === c)) {
            tile.classList.add('new-tile');
          }
          if (animateMerge.some(pos => pos[0] === r && pos[1] === c)) {
            tile.classList.add('merged');
          }

          tileContainer.appendChild(tile);
        }
      }
    }

    // ---------- Update Score Display ----------
    function updateScoreDisplay() {
      scoreEl.textContent = score;
      if (score > bestScore) {
        bestScore = score;
        localStorage.setItem('best2048', bestScore);
      }
      bestScoreEl.textContent = bestScore;
      highScoreDisplay.textContent = '最高分: ' + bestScore;
    }

    // ---------- Check Game Over ----------
    function checkGameOver() {
      // Check for empty cells
      for (let r = 0; r < SIZE; r++) {
        for (let c = 0; c < SIZE; c++) {
          if (grid[r][c] === 0) return false;
        }
      }
      // Check for possible merges
      for (let r = 0; r < SIZE; r++) {
        for (let c = 0; c < SIZE; c++) {
          const val = grid[r][c];
          if (c + 1 < SIZE && grid[r][c+1] === val) return false;
          if (r + 1 < SIZE && grid[r+1][c] === val) return false;
        }
      }
      return true;
    }

    // ---------- Game Over Handler ----------
    function handleGameOver() {
      isGameOver = true;
      stopAI();
      finalScoreEl.textContent = '得分: ' + score;
      gameOverOverlay.classList.remove('hide');
    }

    // ---------- Move Logic ----------
    // Returns { moved, scoreGained, mergedPositions }
    function slideRow(row) {
      // row is an array of 4 numbers (left to right)
      // Remove zeros
      let arr = row.filter(v => v !== 0);
      let merged = [];
      let scoreGain = 0;
      let mergedPositions = []; // not used at row level, we track globally

      for (let i = 0; i < arr.length - 1; i++) {
        if (arr[i] === arr[i+1]) {
          arr[i] *= 2;
          scoreGain += arr[i];
          arr[i+1] = 0;
          merged.push(i);
        }
      }
      arr = arr.filter(v => v !== 0);
      while (arr.length < SIZE) {
        arr.push(0);
      }
      return { newRow: arr, scoreGain, mergedIndices: merged };
    }

    // returns { moved: boolean, scoreGained: number, mergedPositions: [r,c][] }
    function move(direction) {
      if (isGameOver) return { moved: false, scoreGained: 0, mergedPositions: [] };

      // Save snapshot for undo
      history.push({ grid: grid.map(row => [...row]), score: score });

      let scoreGained = 0;
      let moved = false;
      let mergedPositions = [];

      const rotateGrid = (g) => {
        // rotate 90 degrees clockwise
        const newGrid = Array.from({ length: SIZE }, () => Array(SIZE).fill(0));
        for (let r = 0; r < SIZE; r++) {
          for (let c = 0; c < SIZE; c++) {
            newGrid[c][SIZE - 1 - r] = g[r][c];
          }
        }
        return newGrid;
      };

      // Normalize: always process rows left-to-right, then rotate accordingly
      let gridCopy = grid.map(row => [...row]);
      let rotations = 0;
      switch (direction) {
        case 'left':  rotations = 0; break;
        case 'up':    rotations = 1; break;  // rotate once to make "up" become "left"
        case 'right': rotations = 2; break;
        case 'down':  rotations = 3; break;
      }

      // Rotate so that the desired direction becomes left
      for (let i = 0; i < rotations; i++) {
        gridCopy = rotateGrid(gridCopy);
      }

      // For each row, slide left
      let newGrid = [];
      for (let r = 0; r < SIZE; r++) {
        const result = slideRow(gridCopy[r]);
        newGrid.push(result.newRow);
        scoreGained += result.scoreGain;
        if (result.scoreGain > 0) {
          // Record merged positions in original orientation
          // We need to map indices back. For simplicity, we mark the merged positions after rotating back.
        }
        // Check if moved
        for (let c = 0; c < SIZE; c++) {
          if (gridCopy[r][c] !== result.newRow[c]) moved = true;
        }
      }

      // Rotate back
      const rotateBack = (g, times) => {
        for (let i = 0; i < (4 - times) % 4; i++) {
          g = rotateGrid(g);
        }
        return g;
      };

      // Actually we rotated forward, need to rotate back (4-rotations) times
      const finalGrid = rotateBack(newGrid, rotations);

      // Update grid (but keep track of moved positions for animation)
      // Since we lost row-level merge positions due to rotation, we will compute merged positions by comparing old and new grids
      // Simpler: after we update grid, we can detect which cells changed to a larger value
      const oldGrid = grid.map(row => [...row]);
      grid = finalGrid;

      if (moved) {
        score += scoreGained;
        updateScoreDisplay();

        // Determine merged positions (cells where new value > old value)
        for (let r = 0; r < SIZE; r++) {
          for (let c = 0; c < SIZE; c++) {
            if (grid[r][c] !== 0 && grid[r][c] > oldGrid[r][c]) {
              mergedPositions.push([r, c]);
            }
          }
        }

        // Play merge sound if any tiles were merged
        if (scoreGained > 0) {
          playMergeSound();
        }

        // Add new tile
        const added = addRandomTile();
        let animateNew = added ? [added] : [];
        renderTiles(animateNew, mergedPositions);

        // Check game over
        if (checkGameOver()) {
          handleGameOver();
        }
      } else {
        // No move, restore history pop
        history.pop();
        renderTiles([], []);
      }

      return { moved, scoreGained, mergedPositions };
    }

    // ---------- Add Random Tile ----------
    function addRandomTile() {
      const empty = [];
      for (let r = 0; r < SIZE; r++) {
        for (let c = 0; c < SIZE; c++) {
          if (grid[r][c] === 0) empty.push([r, c]);
        }
      }
      if (empty.length === 0) return null;
      const [r, c] = empty[Math.floor(Math.random() * empty.length)];
      grid[r][c] = Math.random() < 0.9 ? 2 : 4;
      return [r, c];
    }

    // ---------- Reset Game ----------
    function resetGame() {
      isGameOver = false;
      gameOverOverlay.classList.add('hide');
      history = [];
      score = 0;
      initGrid();

      // Add two initial tiles
      const pos1 = addRandomTile();
      addRandomTile();

      updateScoreDisplay();
      renderTiles([], []);
      // If the first tile appears with animation, we can mark it
      if (pos1) {
        renderTiles([pos1], []);
      }
    }

    // ---------- Undo ----------
    function undo() {
      if (history.length === 0 || isGameOver) return;
      const prev = history.pop();
      grid = prev.grid.map(row => [...row]);
      score = prev.score;
      updateScoreDisplay();
      renderTiles([], []);
    }

    // ---------- AI Auto-Move ----------
    // Returns a score for the current grid: higher = better
    function evaluateGrid(g) {
      let score = 0;
      // 1. Reward empty cells
      let emptyCount = 0;
      for (let r = 0; r < SIZE; r++) {
        for (let c = 0; c < SIZE; c++) {
          if (g[r][c] === 0) emptyCount++;
        }
      }
      score += emptyCount * 100;

      // 2. Reward large tiles in corners (monotonicity heuristic)
      // 3. Reward smoothness (adjacent tiles differ by factor 2 or less)
      let smoothness = 0;
      for (let r = 0; r < SIZE; r++) {
        for (let c = 0; c < SIZE; c++) {
          if (g[r][c] !== 0) {
            if (c + 1 < SIZE && g[r][c+1] !== 0) {
              const ratio = Math.max(g[r][c], g[r][c+1]) / Math.min(g[r][c], g[r][c+1]);
              smoothness -= Math.log2(ratio);
            }
            if (r + 1 < SIZE && g[r+1][c] !== 0) {
              const ratio = Math.max(g[r][c], g[r+1][c]) / Math.min(g[r][c], g[r+1][c]);
              smoothness -= Math.log2(ratio);
            }
          }
        }
      }
      score += smoothness * 20;

      // 4. Reward keeping max tile in corner
      let maxVal = 0, maxR = 0, maxC = 0;
      for (let r = 0; r < SIZE; r++) {
        for (let c = 0; c < SIZE; c++) {
          if (g[r][c] > maxVal) {
            maxVal = g[r][c];
            maxR = r;
            maxC = c;
          }
        }
      }
      // Prefer max tile in top-left, top-right, bottom-left corners
      const cornerDist = maxR + maxC; // 0 means top-left, 6 means bottom-right
      if (cornerDist <= 1) score += 80;
      else if (cornerDist === 2) score += 40;
      else if (cornerDist === 3) score += 10;

      // 5. Penalize large gaps (empty cells next to high values)
      for (let r = 0; r < SIZE; r++) {
        for (let c = 0; c < SIZE; c++) {
          if (g[r][c] === 0) {
            if (c > 0 && g[r][c-1] > 512) score -= 50;
            if (c < SIZE - 1 && g[r][c+1] > 512) score -= 50;
            if (r > 0 && g[r-1][c] > 512) score -= 50;
            if (r < SIZE - 1 && g[r+1][c] > 512) score -= 50;
          }
        }
      }

      return score;
    }

    // Simulate a move on a grid copy without side effects
    function simulateMove(g, direction) {
      const gridCopy = g.map(row => [...row]);
      const tempGrid = { current: grid };
      grid = gridCopy;
      const result = moveSilent(direction);
      const moved = result.moved;
      const newScore = result.scoreGained;
      const evalScore = evaluateGrid(grid);
      grid = g.map(row => [...row]); // restore original reference
      return { moved, newScore, evalScore, merged: result.scoreGained > 0 };
    }

    // A silent move that doesn't update UI or play sounds, returns { moved, scoreGained }
    function moveSilent(direction) {
      const g = grid.map(row => [...row]);
      let scoreGained = 0;
      let moved = false;

      const rotateGrid = (g) => {
        const newGrid = Array.from({ length: SIZE }, () => Array(SIZE).fill(0));
        for (let r = 0; r < SIZE; r++) {
          for (let c = 0; c < SIZE; c++) {
            newGrid[c][SIZE - 1 - r] = g[r][c];
          }
        }
        return newGrid;
      };

      let gridCopy = g.map(row => [...row]);
      let rotations = { 'left': 0, 'up': 1, 'right': 2, 'down': 3 }[direction] || 0;

      for (let i = 0; i < rotations; i++) {
        gridCopy = rotateGrid(gridCopy);
      }

      let newGrid = [];
      for (let r = 0; r < SIZE; r++) {
        let arr = gridCopy[r].filter(v => v !== 0);
        for (let i = 0; i < arr.length - 1; i++) {
          if (arr[i] === arr[i+1]) {
            arr[i] *= 2;
            scoreGained += arr[i];
            arr[i+1] = 0;
          }
        }
        arr = arr.filter(v => v !== 0);
        while (arr.length < SIZE) arr.push(0);
        if (gridCopy[r].some((v, idx) => v !== arr[idx])) moved = true;
        newGrid.push(arr);
      }

      const rotateBack = (g, times) => {
        for (let i = 0; i < (4 - times) % 4; i++) {
          g = rotateGrid(g);
        }
        return g;
      };
      const finalGrid = rotateBack(newGrid, rotations);

      // Apply to grid in place
      for (let r = 0; r < SIZE; r++) {
        for (let c = 0; c < SIZE; c++) {
          grid[r][c] = finalGrid[r][c];
        }
      }

      return { moved, scoreGained };
    }

    // Choose the best direction using a lookahead heuristic
    function chooseBestMove() {
      const directions = ['left', 'up', 'right', 'down'];
      let bestDir = null;
      let bestScore = -Infinity;

      for (const dir of directions) {
        const result = simulateMove(grid, dir);
        if (!result.moved) continue;
        // Combine evaluation + immediate merge reward
        const total = result.evalScore + result.newScore * 2;
        if (total > bestScore) {
          bestScore = total;
          bestDir = dir;
        }
      }

      return bestDir;
    }

    function doAIMove() {
      if (!aiRunning || isGameOver) {
        stopAI();
        return;
      }
      const dir = chooseBestMove();
      if (!dir) {
        // No valid move found, stop
        stopAI();
        return;
      }
      move(dir);

      // Schedule next move
      if (aiRunning && !isGameOver) {
        aiTimer = setTimeout(doAIMove, 100);
      }
    }

    function startAI() {
      if (isGameOver) return;
      aiRunning = true;
      aiBtn.textContent = '⏹ 停止';
      if (aiTimer) {
        clearTimeout(aiTimer);
        aiTimer = null;
      }
      doAIMove();
    }

    function stopAI() {
      aiRunning = false;
      if (aiTimer) {
        clearTimeout(aiTimer);
        aiTimer = null;
      }
      aiBtn.textContent = '🤖 自动';
    }

    function toggleAI() {
      if (aiRunning) {
        stopAI();
      } else {
        startAI();
      }
    }

    // ---------- Keyboard Handler ----------
    function handleKey(e) {
      const key = e.key;
      // Prevent page scrolling
      if (['ArrowUp', 'ArrowDown', 'ArrowLeft', 'ArrowRight'].includes(key)) {
        e.preventDefault();
      }
      switch (key) {
        case 'ArrowLeft':  move('left'); break;
        case 'ArrowUp':    move('up'); break;
        case 'ArrowRight': move('right'); break;
        case 'ArrowDown':  move('down'); break;
        default: return;
      }
    }

    // ---------- Touch Support (basic) ----------
    let startX, startY;
    function handleTouchStart(e) {
      const touch = e.touches[0];
      startX = touch.clientX;
      startY = touch.clientY;
    }
    function handleTouchEnd(e) {
      if (!startX || !startY) return;
      const touch = e.changedTouches[0];
      const dx = touch.clientX - startX;
      const dy = touch.clientY - startY;
      const absDx = Math.abs(dx);
      const absDy = Math.abs(dy);
      if (Math.max(absDx, absDy) < 20) return; // too short

      if (absDx > absDy) {
        if (dx > 0) move('right');
        else move('left');
      } else {
        if (dy > 0) move('down');
        else move('up');
      }
      startX = startY = null;
    }

    // ---------- Window Resize (re-render) ----------
    let resizeTimer;
    function handleResize() {
      clearTimeout(resizeTimer);
      resizeTimer = setTimeout(() => {
        renderTiles([], []);
      }, 100);
    }

    // ---------- Init ----------
    function init() {
      renderBackground();
      resetGame();

      // Event listeners
      document.addEventListener('keydown', handleKey);
      document.addEventListener('touchstart', handleTouchStart, { passive: true });
      document.addEventListener('touchend', handleTouchEnd, { passive: true });
      window.addEventListener('resize', handleResize);
      newGameBtn.addEventListener('click', resetGame);
      retryBtn.addEventListener('click', resetGame);
      undoBtn.addEventListener('click', undo);
    }

    init();
  })();
</script>
</body>
</html>
