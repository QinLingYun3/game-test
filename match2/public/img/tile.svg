<svg width="256" height="256" viewBox="0 0 256 256" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="tileFace" x1="56" y1="36" x2="200" y2="206" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#FFF7DD"/>
      <stop offset="0.55" stop-color="#F4DFAF"/>
      <stop offset="1" stop-color="#C79A58"/>
    </linearGradient>

    <linearGradient id="tileTop" x1="64" y1="48" x2="192" y2="180" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#FFFDF4"/>
      <stop offset="1" stop-color="#F4D9A2"/>
    </linearGradient>

    <filter id="softShadow" x="-30%" y="-30%" width="160%" height="170%">
      <feDropShadow dx="0" dy="10" stdDeviation="8" flood-color="#5B3A16" flood-opacity="0.28"/>
    </filter>

    <filter id="innerGlow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="2" result="blur"/>
      <feOffset dy="1"/>
      <feComposite in2="SourceAlpha" operator="arithmetic" k2="-1" k3="1" result="innerShadow"/>
      <feColorMatrix in="innerShadow" type="matrix"
        values="1 0 0 0 1
                0 1 0 0 0.92
                0 0 1 0 0.72
                0 0 0 0.55 0"/>
      <feComposite in2="SourceGraphic" operator="over"/>
    </filter>
  </defs>

  <!-- transparent background -->

  <!-- tile body -->
  <rect x="38" y="42" width="180" height="180" rx="30" fill="url(#tileFace)" filter="url(#softShadow)"/>

  <!-- bottom thickness -->
  <path d="M68 212H188C204.6 212 218 198.6 218 182V190C218 206.6 204.6 220 188 220H68C51.4 220 38 206.6 38 190V182C38 198.6 51.4 212 68 212Z"
        fill="#B78342" opacity="0.9"/>

  <!-- top face -->
  <rect x="42" y="36" width="172" height="172" rx="28" fill="url(#tileTop)" filter="url(#innerGlow)"/>

  <!-- highlight -->
  <path d="M72 44H184C197.3 44 206 52.7 206 66"
        fill="none" stroke="#FFFFFF" stroke-width="5" stroke-linecap="round" opacity="0.75"/>

  <!-- animal emoji -->
  <text x="128" y="144"
        text-anchor="middle"
        dominant-baseline="middle"
        font-family="Apple Color Emoji, Segoe UI Emoji, Noto Color Emoji, sans-serif"
        font-size="92">🐶</text>
</svg>
